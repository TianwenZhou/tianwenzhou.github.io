name: Update Daily Brief

on:
  schedule:
    - cron: "5 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate daily data
        env:
          WEATHER_LABEL: Beijing Haidian
          WEATHER_LATITUDE: "39.9593"
          WEATHER_LONGITUDE: "116.2981"
          GOOGLE_CALENDAR_ID: "tianwenzhou0521@gmail.com"
          GOOGLE_CALENDAR_LABEL: "Tianwen Zhou Calendar"
        run: node Agent/scripts/generate-data.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Agent/data/daily-brief.json
          git diff --cached --quiet || git commit -m "chore: update daily brief"
          git push
