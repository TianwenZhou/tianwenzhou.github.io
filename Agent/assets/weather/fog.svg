<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" role="img" aria-label="Animated foggy weather">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#9fb0bd"/>
      <stop offset="100%" stop-color="#d8e0e6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="640" fill="url(#sky)"/>
  <circle cx="600" cy="140" r="86" fill="#ffffff" fill-opacity="0.18"/>
  <g fill="#ffffff" fill-opacity="0.5">
    <g transform="translate(-60 0)">
      <animateTransform attributeName="transform" type="translate" values="-60 0;42 0;-60 0" dur="20s" repeatCount="indefinite"/>
      <rect x="40" y="180" width="420" height="44" rx="22"/>
      <rect x="260" y="250" width="500" height="52" rx="26"/>
      <rect x="90" y="332" width="560" height="48" rx="24"/>
      <rect x="220" y="416" width="500" height="46" rx="23"/>
    </g>
    <g transform="translate(30 0)" fill-opacity="0.36">
      <animateTransform attributeName="transform" type="translate" values="30 0;-44 0;30 0" dur="14s" repeatCount="indefinite"/>
      <rect x="120" y="214" width="520" height="40" rx="20"/>
      <rect x="20" y="294" width="420" height="42" rx="21"/>
      <rect x="300" y="378" width="420" height="40" rx="20"/>
    </g>
  </g>
</svg>
