<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" role="img" aria-label="Animated snowy weather">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#8ba6c2"/>
      <stop offset="100%" stop-color="#d5e3ef"/>
    </linearGradient>
  </defs>
  <rect width="800" height="640" fill="url(#sky)"/>
  <g fill="#eef4fa">
    <ellipse cx="254" cy="190" rx="120" ry="54"/>
    <ellipse cx="372" cy="176" rx="82" ry="42"/>
    <ellipse cx="154" cy="208" rx="86" ry="34"/>
    <ellipse cx="566" cy="226" rx="140" ry="60"/>
    <ellipse cx="680" cy="210" rx="90" ry="42"/>
    <ellipse cx="446" cy="246" rx="96" ry="38"/>
  </g>
  <g fill="#ffffff">
    <g transform="translate(0 -120)">
      <animateTransform attributeName="transform" type="translate" values="0 -120;0 120;0 -120" dur="9s" repeatCount="indefinite"/>
      <circle cx="132" cy="280" r="5"/>
      <circle cx="212" cy="330" r="6"/>
      <circle cx="316" cy="292" r="4"/>
      <circle cx="392" cy="354" r="6"/>
      <circle cx="486" cy="312" r="5"/>
      <circle cx="580" cy="364" r="6"/>
      <circle cx="674" cy="298" r="5"/>
    </g>
    <g transform="translate(18 -180)" opacity="0.8">
      <animateTransform attributeName="transform" type="translate" values="18 -180;18 150;18 -180" dur="7s" repeatCount="indefinite"/>
      <circle cx="176" cy="240" r="4"/>
      <circle cx="264" cy="284" r="5"/>
      <circle cx="346" cy="248" r="5"/>
      <circle cx="448" cy="292" r="4"/>
      <circle cx="548" cy="250" r="5"/>
      <circle cx="628" cy="292" r="4"/>
    </g>
    <g transform="translate(-16 -90)" opacity="0.62">
      <animateTransform attributeName="transform" type="translate" values="-16 -90;-16 170;-16 -90" dur="5.5s" repeatCount="indefinite"/>
      <circle cx="132" cy="210" r="3.5"/>
      <circle cx="242" cy="228" r="3"/>
      <circle cx="358" cy="216" r="3"/>
      <circle cx="460" cy="236" r="3.5"/>
      <circle cx="590" cy="214" r="3"/>
      <circle cx="700" cy="238" r="3.5"/>
    </g>
  </g>
</svg>
