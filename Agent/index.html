<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Dashboard</title>
    <meta
      name="description"
      content="??????????????????? AI ?????"
    />
    <link rel="stylesheet" href="./styles.css?v=20260419-2" />
  </head>
  <body>
    <div class="page-shell">
      <main class="dashboard">
        <section class="widget-grid widget-grid-top">
          <section class="panel compact-panel panel-span-2" aria-labelledby="weatherTitle">
            <div class="panel-heading compact-heading">
              <div>
                <p class="panel-kicker">Weather & Clock</p>
                <h2 id="weatherTitle">?????</h2>
              </div>
              <span class="panel-tag">Haidian ? Asia/Shanghai</span>
            </div>
            <div id="weatherCurrent" class="weather-current weather-hero skeleton">
              <div id="weatherVisual" class="weather-visual"></div>
              <div class="weather-hero-body">
                <div class="weather-hero-top">
                  <span id="weatherCondition" class="weather-chip">--</span>
                  <span id="weatherLocation" class="panel-tag">--</span>
                </div>
                <div class="weather-hero-main">
                  <div class="weather-hero-copy">
                    <strong id="weatherTemperature">--?C</strong>
                    <p id="weatherDescription">--</p>
                  </div>
                  <div class="weather-hero-clock">
                    <p id="currentTime" class="time-value">--:--:--</p>
                    <p id="currentDate" class="time-date">--</p>
                    <p id="generatedAt" class="time-meta">???????--</p>
                  </div>
                </div>
                <div class="weather-metrics">
                  <span id="weatherWind">?? --</span>
                  <span id="weatherRange">?? -- / --</span>
                  <span id="weatherRain">?? --</span>
                </div>
              </div>
            </div>
            <div id="weatherDaily" class="weather-daily"></div>
          </section>

          <section class="panel compact-panel scenic-panel" aria-labelledby="featuredPlaceTitle">
            <div class="panel-heading compact-heading">
              <div>
                <p class="panel-kicker">Scenic View</p>
                <h2 id="featuredPlaceTitle">????</h2>
              </div>
              <span class="panel-tag">Daily Escape</span>
            </div>
            <div id="featuredPlacePanel" class="featured-place skeleton"></div>
          </section>
        </section>

        <section class="widget-grid widget-grid-news">
          <section class="panel" aria-labelledby="domesticNewsTitle">
            <div class="panel-heading news-panel-heading">
              <div>
                <p class="panel-kicker">China</p>
                <h2 id="domesticNewsTitle" class="panel-title-line"><span class="panel-icon" aria-hidden="true">CN</span><span>????</span></h2>
              </div>
              <span class="panel-tag">Top 5</span>
            </div>
            <div id="domesticNews" class="news-list premium-news-list"></div>
          </section>

          <section class="panel" aria-labelledby="internationalNewsTitle">
            <div class="panel-heading news-panel-heading">
              <div>
                <p class="panel-kicker">World</p>
                <h2 id="internationalNewsTitle" class="panel-title-line"><span class="panel-icon" aria-hidden="true">GL</span><span>????</span></h2>
              </div>
              <span class="panel-tag">Top 5</span>
            </div>
            <div id="internationalNews" class="news-list premium-news-list"></div>
          </section>

          <section class="panel" aria-labelledby="nbaNewsTitle">
            <div class="panel-heading news-panel-heading">
              <div>
                <p class="panel-kicker">NBA</p>
                <h2 id="nbaNewsTitle" class="panel-title-line"><span class="panel-icon" aria-hidden="true">NBA</span><span>NBA ??</span></h2>
              </div>
              <span class="panel-tag">Top 6</span>
            </div>
            <div id="nbaScoreboard" class="scoreboard-panel"></div>
            <div id="nbaNews" class="news-list premium-news-list"></div>
          </section>
        </section>

        <section class="panel panel-wide" aria-labelledby="papersTitle">
          <div class="panel-heading">
            <div>
              <p class="panel-kicker">Paper Picks</p>
              <h2 id="papersTitle">???????</h2>
              <p class="panel-subtitle">
                ????? arXiv ???????????????? / ???????????????
              </p>
            </div>
            <span id="paperRotationLabel" class="panel-tag">Daily Rotation</span>
          </div>
          <div id="paperHighlights" class="paper-list"></div>
        </section>
      </main>
    </div>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <p>?????????????????</p>
      </div>
    </template>

    <script type="module" src="./app.js?v=20260419-2"></script>
  </body>
</html>
