<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Agent Daily Brief</title>
    <meta
      name="description"
      content="每天查看 NBA 新闻、天气预报和人工智能论文进展。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">zhoutianwen.com/Agent</p>
        <h1>你的每日情报站</h1>
        <p class="hero-copy">
          每 4 小时自动刷新一次，集中查看 NBA 新闻、北京市海淀区天气，以及你关注的 AI 论文方向。
        </p>
        <div class="hero-meta">
          <span id="generatedAt">正在读取今日摘要...</span>
          <button id="refreshButton" type="button">重新加载</button>
        </div>
      </header>

      <main class="grid">
        <section class="panel panel-weather" aria-labelledby="weatherTitle">
          <div class="panel-heading">
            <div>
              <p class="panel-kicker">Weather</p>
              <h2 id="weatherTitle">海淀区天气</h2>
            </div>
            <span id="weatherLocation" class="panel-tag">--</span>
          </div>
          <div id="weatherCurrent" class="weather-current skeleton"></div>
          <div id="weatherDaily" class="weather-daily"></div>
        </section>

        <section class="panel" aria-labelledby="newsTitle">
          <div class="panel-heading">
            <div>
              <p class="panel-kicker">NBA</p>
              <h2 id="newsTitle">最新新闻</h2>
            </div>
            <span class="panel-tag">Top 6</span>
          </div>
          <div id="nbaNews" class="news-list"></div>
        </section>

        <section class="panel panel-wide" aria-labelledby="papersTitle">
          <div class="panel-heading">
            <div>
              <p class="panel-kicker">AI Papers</p>
              <h2 id="papersTitle">论文进展分板块追踪</h2>
            </div>
            <span class="panel-tag">4 Topics</span>
          </div>
          <div id="paperHighlights" class="paper-list"></div>
        </section>
      </main>
    </div>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <p>今天的内容还没准备好，请稍后再试。</p>
      </div>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
